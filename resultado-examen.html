<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Consulta de Resultados Académicos</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <div class="logo">

        <h1>PORTAL UPA</h1>

        <p>Institución Técnica Unidos por Antioquia</p>

    </div>

</header>

<main>

<section class="bienvenida">

    <h2>📋 Consulta de Resultados Académicos</h2>

    <p>

        Ingrese el nombre completo del estudiante para consultar el resultado del examen.

    </p>

    <br>

    <div style="position:relative;max-width:500px;margin:auto;">

        <input
            type="text"
            id="nombre"
            placeholder="Escriba el nombre completo"
            autocomplete="off">

        <div id="sugerencias" class="lista-sugerencias"></div>

    </div>

    <br>

    <button onclick="consultar()">

        🔍 Consultar

    </button>

    <br><br>

    <div id="resultado"></div>

    <br>

    <!-- BOTÓN PARA DESCARGAR PDF -->
    <button id="btnPDF"
            onclick="descargarPDF()"
            style="display:none; background:#0B4F3A; color:white; border:none; padding:12px 25px; border-radius:10px; cursor:pointer; font-size:16px;">

        📄 Descargar Resultado en PDF

    </button>

</section>

<div style="text-align:center; margin:40px;">

    <a href="index.html">

        <button>

            ⬅ Volver al Inicio

        </button>

    </a>

</div>

</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/resultados.js"></script>

</body>

</html>
